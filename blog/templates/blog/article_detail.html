<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ article.title }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura.css/css/sakura.css" type="text/css">
</head>
<body>
{% load feincms3 menus %}
{% main_menu as menu %}
<nav class="main-menu">
{% for p in menu %}
  <a {% if p.id in page.tree_path %}class="active"{% endif %} href="{{ p.get_absolute_url }}">{{ p.title }}</a>
{% endfor %}
</nav>

<h1>{{ article.title }}</h1>
<p>{{ article.publication_date|date:"d.m.Y" }}</p>
{% render_region content_regions "main" %}
</body>
</html>
